<!-- Design: Royal Cyberpunk (Midnight Navy & Liquid Gold) -->
<div id="app" style="background: #000b1a; color: #ffd700; font-family: 'Segoe UI', sans-serif; padding: 20px; border: 2px solid #ffd700;">
    <h2>💎 Nexura Central Bank</h2>
    <div id="user-list"></div>
    <hr style="border: 0.5px solid #ffd700;">
    <button onclick="initiateTransfer()" style="background: #ffd700; color: #000; padding: 10px; font-weight: bold; cursor: pointer;">
        SEND MONEY 💸
    </button>
</div>

<script>
async function initiateTransfer() {
    const senderName = prompt("Enter your Name:");
    const senderPass = prompt("Enter your Password:");
    
    const response = await fetch('data.json');
    let users = await response.json();
    
    const sender = users.find(u => u.name === senderName && u.password === senderPass);
    
    if (sender) {
        const receiverName = prompt("Receiver Name:");
        const amount = parseInt(prompt("Amount to send:"));
        
        if (amount > sender.balance) {
            alert("❌ Error: Insufficient Balance!");
        } else {
            const receiver = users.find(u => u.name === receiverName);
            if (receiver) {
                sender.balance -= amount;
                receiver.balance += amount;
                alert(`✅ Success! ${amount} transferred to ${receiverName}`);
                // Yahan aap GitHub Action ko trigger karne ke liye API call karenge
                updateDatabase(users);
            } else {
                alert("❌ User not found!");
            }
        }
    } else {
        alert("❌ Invalid Login!");
    }
}
</script>
