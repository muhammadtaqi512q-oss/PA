<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXURA Core Banking</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white font-sans p-8">

    <div class="max-w-4xl mx-auto">
        <header class="flex justify-between items-center border-b border-slate-700 pb-6 mb-6">
            <h1 class="text-3xl font-bold text-cyan-400">NEXURA Central Ledger</h1>
            <button onclick="openTransferModal()" class="bg-cyan-500 hover:bg-cyan-600 px-6 py-2 rounded-lg font-semibold transition">
                Send Money
            </button>
        </header>

        <div id="accounts-grid" class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
            </div>
    </div>

    <script>
        const repoOwner = "muhammadtaqi512q-oss"; // Apna GitHub Username dalein
        const repoName = "your-repo-name";       // Apna Repo Name dalein

        // Load Data
        fetch('data.json?cache-bust=' + Date.now())
            .then(res => res.json())
            .then(data => {
                const grid = document.getElementById('accounts-grid');
                for (const [name, user] of Object.entries(data.users)) {
                    grid.innerHTML += `
                        <div class="bg-slate-800 p-5 rounded-xl border border-slate-700 shadow-lg">
                            <div class="flex justify-between items-start">
                                <div>
                                    <h3 class="text-xl font-bold">${name}</h3>
                                    ${user.title ? `<span class="text-xs bg-cyan-900 text-cyan-300 px-2 py-0.5 rounded">${user.title}</span>` : ''}
                                </div>
                                <span class="text-emerald-400 font-mono text-lg font-bold">Rs. ${user.balance.toLocaleString()}</span>
                            </div>
                            <div class="mt-3 text-sm text-slate-400 flex justify-between">
                                <span>Level: ${user.level || 1}</span>
                                <span>Stars: ${'⭐'.repeat(user.stars || 0)}</span>
                            </div>
                        </div>
                    `;
                }
            });

        function openTransferModal() {
            const sender = prompt("Enter your account Name:");
            const password = prompt("Enter your Password:");
            
            // Fetch validation dynamically
            fetch('data.json')
                .then(res => res.json())
                .then(data => {
                    if(!data.users[sender] || data.users[sender].password !== password) {
                        alert("Invalid Credentials!");
                        return;
                    }

                    const receiver = prompt("Enter Receiver's Name:");
                    if(!data.users[receiver]) {
                        alert("Receiver not found!");
                        return;
                    }

                    const amount = parseInt(prompt("Enter Amount to Transfer:"));
                    if(amount > data.users[sender].balance) {
                        alert("Error: Insufficient funds! Your balance is Rs. " + data.users[sender].balance);
                        return;
                    }

                    // Trigger GitHub Workflow using Issue Automation
                    const issueTitle = `TRANSFER: ${sender} TO ${receiver}`;
                    const issueBody = JSON.stringify({ sender, receiver, amount, type: "transfer" });
                    
                    // Directing user to open an automated issue link
                    const url = `https://github.com/${repoOwner}/${repoName}/issues/new?title=${encodeURIComponent(issueTitle)}&body=${encodeURIComponent(issueBody)}`;
                    alert("Click OK to authorize transaction on GitHub.");
                    window.open(url, '_blank');
                });
        }
    </script>
</body>
</html>
