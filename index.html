<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXURA Core Banking</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white p-8">

    <div class="max-w-4xl mx-auto">
        <header class="flex justify-between items-center border-b border-slate-700 pb-6 mb-6">
            <h1 class="text-3xl font-bold text-cyan-400">NEXURA Central Ledger</h1>
            <div class="space-x-4">
                <a href="domain.html" class="bg-slate-800 hover:bg-slate-700 border border-slate-600 px-4 py-2 rounded-lg font-medium transition inline-block">Sell Domain</a>
                <button onclick="startTransfer()" class="bg-cyan-500 hover:bg-cyan-600 px-6 py-2 rounded-lg font-semibold transition">Send Money</button>
            </div>
        </header>

        <div id="accounts-grid" class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
            </div>
    </div>

    <script>
        const REPO_OWNER = "muhammadtaqi512q-oss"; 
        const REPO_NAME = "PA"; 

        let localData = {};

        function loadData() {
            fetch('data.json?nocache=' + Date.now())
                .then(res => res.json())
                .then(data => {
                    localData = data;
                    const grid = document.getElementById('accounts-grid');
                    grid.innerHTML = '';
                    for (const [name, user] of Object.entries(data.users)) {
                        grid.innerHTML += `
                            <div class="bg-slate-800 p-5 rounded-xl border border-slate-700">
                                <div class="flex justify-between items-start">
                                    <div>
                                        <h3 class="text-xl font-bold">${name}</h3>
                                        ${user.title ? `<span class="text-xs bg-cyan-950 text-cyan-400 px-2 py-0.5 rounded block mt-1">${user.title}</span>` : ''}
                                    </div>
                                    <span class="text-emerald-400 font-mono text-lg font-bold">Rs. ${user.balance.toLocaleString()}</span>
                                </div>
                                <div class="mt-4 text-sm text-slate-400 flex justify-between items-center border-t border-slate-700/50 pt-2">
                                    <span>Level: <b class="text-white">${user.level || 1}</b></span>
                                    <span>Stars: <b class="text-amber-400">${'⭐'.repeat(user.stars || 0) || 'None'}</b></span>
                                </div>
                            </div>
                        `;
                    }
                }).catch(err => console.log("Error reading layout ledger:", err));
        }
        window.onload = loadData;

        function startTransfer() {
            const sender = prompt("Enter your Name:");
            const password = prompt("Enter your Password:");
            
            if(!localData.users[sender] || localData.users[sender].password !== password) {
                alert("Incorrect username or password!");
                return;
            }

            const receiver = prompt("Enter Receiver's Name:");
            if(!localData.users[receiver]) {
                alert("Receiver not found!");
                return;
            }

            const amount = parseInt(prompt("Enter Amount to Transfer:"));
            if(isNaN(amount) || amount <= 0 || amount > localData.users[sender].balance) {
                alert(`Error: Invalid Amount or Insufficient funds!\nYour balance: Rs. ${localData.users[sender].balance}`);
                return;
            }

            const issueTitle = `TX_TRANSFER`;
            const issueBody = `SENDER:${sender}|RECEIVER:${receiver}|AMOUNT:${amount}`;
            const githubIssueUrl = `https://github.com/${REPO_OWNER}/${REPO_NAME}/issues/new?title=${encodeURIComponent(issueTitle)}&body=${encodeURIComponent(issueBody)}`;
            
            alert("Redirecting to Secure Verification Core. Click 'Submit new issue' to confirm transfer!");
            window.open(githubIssueUrl, '_blank');
        }
    </script>
</body>
</html>
