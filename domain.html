<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NEXURA Domain Registry</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-neutral-900 text-white p-8">
    <div class="max-w-md mx-auto bg-neutral-800 p-6 rounded-2xl border border-neutral-700 shadow-2xl mt-12">
        <div class="mb-4"><a href="index.html" class="text-sm text-neutral-400 hover:text-white">&larr; Back to Dashboard</a></div>
        <h2 class="text-2xl font-bold text-amber-400 mb-6 text-center">Sell Your Domain</h2>
        
        <div class="space-y-4">
            <div>
                <label class="block text-sm text-neutral-400 mb-1">Username</label>
                <input id="dom-user" type="text" placeholder="e.g. a" class="w-full bg-neutral-900 border border-neutral-700 p-2 rounded text-white focus:outline-none focus:border-amber-500">
            </div>
            <div>
                <label class="block text-sm text-neutral-400 mb-1">Domain Name</label>
                <input id="dom-name" type="text" placeholder="e.g. a" class="w-full bg-neutral-900 border border-neutral-700 p-2 rounded text-white focus:outline-none focus:border-amber-500">
            </div>
            <div>
                <label class="block text-sm text-neutral-400 mb-1">Cipher Password</label>
                <input id="dom-pass" type="text" placeholder="e.g. 1,1" class="w-full bg-neutral-900 border border-neutral-700 p-2 rounded text-white focus:outline-none focus:border-amber-500">
            </div>
            <div>
                <label class="block text-sm text-neutral-400 mb-1">Target Account Name (To receive Rs. 10,000)</label>
                <input id="dom-target" type="text" placeholder="e.g. Muhammad TAQI" class="w-full bg-neutral-900 border border-neutral-700 p-2 rounded text-white focus:outline-none focus:border-amber-500">
            </div>
            <button onclick="validateAndSell()" class="w-full bg-amber-500 hover:bg-amber-600 text-neutral-950 font-bold py-2 rounded transition mt-2">
                Verify & Sell Domain
            </button>
        </div>
    </div>

    <script>
        const REPO_OWNER = "muhammadtaqi512q-oss"; 
        const REPO_NAME = "PA"; 

        function getCipherValue(str) {
            return str.toLowerCase().replace(/[^a-z]/g, '').split('').map(char => char.charCodeAt(0) - 96).join('');
        }

        function validateAndSell() {
            const user = document.getElementById('dom-user').value.trim();
            const domain = document.getElementById('dom-name').value.trim();
            const password = document.getElementById('dom-pass').value.trim();
            const targetAccount = document.getElementById('dom-target').value.trim();

            const expectedPassword = `${getCipherValue(user)},${getCipherValue(domain)}`;

            if(password !== expectedPassword) {
                alert(`Authentication Error! Calculated secure cipher combination is: ${expectedPassword}`);
                return;
            }

            const issueTitle = `TX_DOMAIN`;
            const issueBody = `TARGET:${targetAccount}|DOMAIN:${domain}`;
            const githubIssueUrl = `https://github.com/${REPO_OWNER}/${REPO_NAME}/issues/new?title=${encodeURIComponent(issueTitle)}&body=${encodeURIComponent(issueBody)}`;
            
            alert("Cipher code approved! Click 'Submit new issue' to push logs to the cloud core system.");
            window.open(githubIssueUrl, '_blank');
        }
    </script>
</body>
</html>
