name: Nexura Transaction Engine

on:
  issues:
    types: [opened]

jobs:
  process-transaction:
    if: contains(github.event.issue.title, 'TRANSFER:') || contains(github.event.issue.title, 'DOMAIN_SALE:')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Execute Runtime Script
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const issueBody = JSON.parse(`${{ github.event.issue.body }}`);
            let data = JSON.parse(fs.readFileSync('data.json', 'utf8'));
            
            // Transaction Incrementor counter
            data.latest_transaction = (data.latest_transaction || 0) + 1;
            const txId = data.latest_transaction;

            if (issueBody.type === 'transfer') {
              const { sender, receiver, amount } = issueBody;
              
              if (data.users[sender].balance >= amount) {
                data.users[sender].balance -= amount;
                data.users[receiver].balance += amount;
                
                // Markdown Sequential Receipt Generation
                const mdFileName = `${sender.replace(/\s+/g, '')}${txId}.md`;
                const receiptContent = `# Nexura Financial Receipt\n\n**Transaction ID:** ${txId}\n**Sender:** ${sender}\n**Receiver:** ${receiver}\n**Amount Transferred:** Rs. ${amount}\n**Timestamp:** ${new Date().toISOString()}`;
                fs.writeFileSync(mdFileName, receiptContent);
              }
            } 
            
            else if (issueBody.type === 'domain_sale') {
              const { target, domain } = issueBody;
              
              if (data.users[target]) {
                data.users[target].balance += 10000;
                data.users[target].stars = (data.users[target].stars || 0) + 1;
                
                // Gamification Level Handler Logic (Every 5 Stars = Level Up)
                if (data.users[target].stars >= 5) {
                  data.users[target].level = (data.users[target].level || 1) + 1;
                  data.users[target].stars = 0; // Reset stars after dynamic level jump
                }

                const mdFileName = `${target.replace(/\s+/g, '')}${txId}.md`;
                const receiptContent = `# Nexura Domain Sale Log\n\n**Asset Sold:** ${domain}\n**Credit Target:** ${target}\n**Payout:** Rs. 10,000\n**New Level:** ${data.users[target].level}\n**Timestamp:** ${new Date().toISOString()}`;
                fs.writeFileSync(mdFileName, receiptContent);
              }
            }

            // Sync Database State
            fs.writeFileSync('data.json', JSON.stringify(data, null, 2));

      - name: Commit & Deploy Architecture Changes
        run: |
          git config --global user.name "Nexura System Engine"
          git config --global user.email "engine@nexura.ai"
          git add data.json *.md
          git commit -m "System: Update Ledger States and Sync Receipts [File Sequence Triggered]"
          git push

      - name: Close Issue Automatically
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed',
              comment: 'Transaction integrated successfully into blockchain ledger architecture.'
            })
