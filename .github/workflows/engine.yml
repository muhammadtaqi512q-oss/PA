name: Nexura No-Token Engine

on:
  issues:
    types: [opened]

jobs:
  process-tx:
    if: github.event.issue.title == 'TX_TRANSFER' || github.event.issue.title == 'TX_DOMAIN'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout Code Architecture
        uses: actions/checkout@v4

      - name: Process Business Data
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const issueBody = context.payload.issue.body; 
            
            let data = JSON.parse(fs.readFileSync('data.json', 'utf8'));
            data.latest_transaction = (data.latest_transaction || 0) + 1;
            const txId = data.latest_transaction;

            // --- A. MONEY TRANSFER LOGIC ENGINE ---
            if (context.payload.issue.title === 'TX_TRANSFER') {
              const parts = issueBody.split('|');
              const sender = parts[0].split(':')[1];
              const receiver = parts[1].split(':')[1];
              const amount = parseInt(parts[2].split(':')[1]);

              if (data.users[sender] && data.users[receiver] && data.users[sender].balance >= amount) {
                data.users[sender].balance -= amount;
                data.users[receiver].balance += amount;

                // Generating sequential file structure (e.g. OLIVIA1.md, OLIVIA2.md)
                const cleanSenderName = sender.replace(/\s+/g, '');
                const fileName = `${cleanSenderName}${txId}.md`;
                
                const content = `# Nexura Financial Transaction Ledger: ${cleanSenderName}${txId}\n\n## Transaction Details\n- **Status:** SUCCESS\n- **Transaction Reference ID:** #${txId}\n- **Sender Account:** ${sender}\n- **Receiver Account:** ${receiver}\n- **Total Volume Sent:** Rs. ${amount.toLocaleString()}\n\n---\n*This is an automated ledger file generated securely by Nexura Engine.*`;
                fs.writeFileSync(fileName, content);
              }
            }

            // --- B. DOMAIN SELLING & REWARDS LOGIC ENGINE ---
            if (context.payload.issue.title === 'TX_DOMAIN') {
              const parts = issueBody.split('|');
              const target = parts[0].split(':')[1];
              const domain = parts[1].split(':')[1];

              if (data.users[target]) {
                data.users[target].balance += 10000;
                data.users[target].stars = (data.users[target].stars || 0) + 1;

                // Level Milestone System (Every 5 Stars = Level Upgrade)
                if (data.users[target].stars >= 5) {
                  data.users[target].level = (data.users[target].level || 1) + 1;
                  data.users[target].stars = 0;
                }

                // Generating target binary filename logs
                const cleanTargetName = target.replace(/\s+/g, '');
                const fileName = `${cleanTargetName}${txId}.md`;
                
                const content = `# Nexura Domain Registry Receipt: ${cleanTargetName}${txId}\n\n## Asset Acquisition Log\n- **Status:** PROCESSED & VERIFIED\n- **Registry Reference ID:** #${txId}\n- **Account Beneficiary:** ${target}\n- **Domain Name Sold:** ${domain}\n- **Disbursement Credited:** Rs. 10,000\n- **Current Level Status:** Level ${data.users[target].level}\n\n---\n*This is an automated registry file generated securely by Nexura Engine.*`;
                fs.writeFileSync(fileName, content);
              }
            }

            fs.writeFileSync('data.json', JSON.stringify(data, null, 2));

      - name: Deploy & Sync Repository State
        run: |
          git config --global user.name "Nexura Engine"
          git config --global user.email "engine@nexura.ai"
          git add data.json *.md
          git commit -m "Nexura System Sync: Generated new user sequence README ledger and synced balances" || echo "No changes found"
          git push

      - name: Terminate and Close Process Issue
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed',
              comment: 'Transaction processed successfully! Dynamic user sequence README file has been compiled and injected into the repo architecture.'
            })
