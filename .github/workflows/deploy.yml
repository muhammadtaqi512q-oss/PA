name: Deploy Nexura Dual Platforms

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Application Environment Matrix
        run: |
          echo '{"name": "nexura-pa-ecosystem", "version": "1.0.0", "private": true}' > package.json
          npm install javascript-obfuscator

      - name: Run Global Compiler Engine
        run: node compile.js

      - name: Setup Pages Configuration
        uses: actions/configure-pages@v4

      - name: Upload Build Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy Live Ecosystem to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
